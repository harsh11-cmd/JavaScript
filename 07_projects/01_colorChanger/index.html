<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>
</head>
<body>
<div>
   <h1> <span class="button" id="red" font-size="20px">Red</span> </h1>
   <h1> <span class="button" id="blue" font-size="20px">Blue</span> </h1>
   <h1> <span class="button" id="green" font-size="20px">Green</span> </h1>
    <h2>Click on the button to change the color of this text</h2>
</div>

</body>
<script>
const buttons = document.querySelectorAll('.button');
const body = document.querySelector('body');

buttons.forEach(function(button){
    button.addEventListener('click',function(e){
        console.log(e.target)
        if(e.target.id==='red'){
            body.style.backgroundColor = 'red';
        }else if(e.target.id==='blue'){
            body.style.backgroundColor = 'blue';
        }else if(e.target.id==='green'){
            body.style.backgroundColor = 'green';
        }
        else{
            body.style.backgroundColor = 'white';
        }
    })
})
</script>
</html>
