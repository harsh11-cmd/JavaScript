<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    <center>
    <div>
        <form>
        <h1> BMI Calculator</h1>
        Weight: <input type="text" id="weight" placeholder="Enter your weight in kg"><br><br>
        Height: <input type="text" id="height" placeholder="Enter your height in cm"><br><br>
        <input type="submit" id="calculate" value="Calculate BMI"><br><br>
        <h2 id="result"> </h2><br><br>

       
        <h2>BMI categories</h2>
        <h4>Under Weight : Less thann 18.5</h4>
        <h4>Normal Weight : 18.5 - 24.9</h4>
        <h4>Over Weight : 25 - 29.9</h4>
        
        </form>
    </div>
    </center>
</body>
<script>
    const form = document.querySelector('form');

    form.addEventListener('submit',function(e){
        e.preventDefault();

        const weightInput=parseInt(document.querySelector('#weight').value);
        const heightInput=parseInt(document.querySelector('#height').value);
        const result=document.querySelector('#result');

        if(weightInput==''|| weightInput<=0 || isNaN(weightInput)){
            result.innerHTML='Please enter a valid weight';
        }else if(heightInput==''|| heightInput<=0 || isNaN(heightInput)){
            result.innerHTML='Please enter a valid height';
        }else{
            const bmi=(weightInput/(heightInput*heightInput/10000)).toFixed(2);
            result.innerHTML=`Your BMI is ${bmi}`;
        }

    }) 
</script>
</html>
