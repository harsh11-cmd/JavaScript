<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind React</title>
</head>
<body>
    <button id="btn">Click Me</button>
</body>
<script>
    class React{
        constructor(){
            this.library = "React";
            this.server="http://localhost:3000";

             document
            .querySelector("button")
            .addEventListener("click",this.handleClick
            .bind(this)); //bind method is used to bind the context of the function to the current instance of the class. 
            // Without bind, 'this' would refer to the button element instead of the React class instance.
        }
        handleClick(){
            console.log("Button Clicked");
            console.log(this.library);
            console.log(this.server);
        }
       

    }
    const react = new React();
</script>
</html>
