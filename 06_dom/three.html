<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Element Creation</title>
</head>
<body>
    <script>
        //How to create a new element in the DOM using JavaScript
        const div=document.createElement("div");
        div.className="main";
        div.id="01";
        //div.id=Math.round(Math.random()*10+1); // another way to create a random id for the div element
        div.innerText="This is a new div element created using JavaScript";
        div.style.backgroundColor="green";
        div.style.color="white";
        div.setAttribute("title","this is a new div element");
       // const addtext=document.createTextNode("This is a new text node created using JavaScript"); // another way to create a new text node and append it instead of using innerText 
       // div.appendChild(addtext);
        document.body.appendChild(div); // how to add the new element to the DOM using appendChild method
    </script>
</body>
</html>
